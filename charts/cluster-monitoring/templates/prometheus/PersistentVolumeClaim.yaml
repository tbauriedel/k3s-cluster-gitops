---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: prometheus-server-data
  namespace: monitoring
spec:
  accessModes:
    - ReadWriteMany
{{- if .Values.monitoring_storage_class }}
  storageClassName: {{ .Values.monitoring_storage_class }}
{{- end }}
  resources:
    requests: {{ .Values.monitoring_storage_size_prometheus }}