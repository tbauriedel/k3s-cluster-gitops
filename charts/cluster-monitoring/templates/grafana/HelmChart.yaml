apiVersion: helm.cattle.io/v1
kind: HelmChart
metadata:
  name: grafana
  namespace: monitoring
spec:
  repo: https://grafana.github.io/helm-charts
  chart: grafana
  targetNamespace: monitoring
  version: 10.5.15
  valuesContent: |
    persistence:
      enabled:  true
      volumeName: grafana-server-data
      datasources:
      - name: Prometheus
       type: prometheus
       url: http://prometheus-server:80
       isDefault: true