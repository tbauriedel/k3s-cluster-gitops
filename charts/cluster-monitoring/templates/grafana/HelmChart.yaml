apiVersion: helm.cattle.io/v1
kind: HelmChart
metadata:
  name: grafana
  namespace: monitoring
spec:
  repo: https://grafana-community.github.io/helm-charts/
  chart: grafana
  targetNamespace: monitoring
  version: 10.5.15
  valuesContent: |
    persistence:
      enabled:  true
      existingClaim: grafana-server-data
    datasources:
      datasources.yaml:
        apiVersion: 1
        datasources:
          - name: Prometheus
            type: prometheus
            access: proxy
            url: http://prometheus-server:80
            isDefault: true