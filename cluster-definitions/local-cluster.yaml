---
# charts/cluster-kube-vip
kube_vip_interface: eth0
kube_vip_address: 192.168.121.10

# charts/cluster-traefik-tls (only dummy values used here)
traefik_tls_crt: 
traefik_tls_key: 

# https://github.com/kubernetes-csi/csi-driver-nfs
storageClasses:
  - name: nfs
    annotations:
      storageclass.kubernetes.io/is-default-class: "true"
    parameters:
      server: 192.168.1.188
      share: /data/k3s
    reclaimPolicy: Delete
    volumeBindingMode: Immediate
    mountOptions:
      - nfsvers=4.1