apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: kube-vip
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/tbauriedel/k3s-platform
    targetRevision: add-gitops
    path: gitops/charts/kube-vip
    helm:
      valueFiles:
        - cluster-definitions/local-cluster.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: kube-system
  syncPolicy:
    automated:
      prune: true
      selfHeal: true